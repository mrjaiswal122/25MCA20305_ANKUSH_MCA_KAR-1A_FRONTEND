<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  </head>
  <body class="min-vw-100">
    <h1>Smart To-Do Manager</h1>
<form action="" class="d-flex flex-column gap-3 w-50 border border-primary p-3 rounded mb-3">

    <label for="taskName">
        Task Name:
        <input id="taskName" type="text" placeholder="Task Name" />
    </label>
    
    <label for="priority">
        Priority:
        <select name="priority" id="priority" placeholder="Select Priority">
            <option value="low" selected>Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>
    </label>
    
    <label for="date">
        Deadline:
        <input id="date" type="date" />
    </label>
    
    <button id="createToDo" type="submit" class="bg-primary  w-10">Add Task</button>
</form>
<!-- tO DISPLAY all the tasks -->
    <section class="border border-primary w-fit">
        <div class="controls d-flex  gap-3 p-3">

            <label for="sorting">Sort:
    
                <select name="sort" id="sorting">
                    <option value="high-low">High to Low</option>
                    <option value="low-high">Low to High</option>
                    <option value="nearest">Nearest Deadline</option>
                </select>
            </label>
            <button class="bg-primary">All Tasks</button>
            <button class="bg-success">Completed Tasks</button>
            <button class="bg-warning">Pending Tasks</button>

        </div>
        <div class="mt-2 mb-2">
      
            <span  class="badge bg-primary">Total: <span id="total">0</span></span>
            <span  class="badge bg-success">Completed: <span id="done">0</span></span>
            <span  class="badge bg-warning">Pending: <span id="pending">0</span></span>
        </div>
        <div id="toDoList" class="border border-secondary w-fit">
            <!-- Tasks will be displayed here -->
        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./surprise.js"></script>
  </body>
</html>
